<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flood-Aware Evacuation Routing</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; }
  header { padding: 16px 24px; background: #161b22; border-bottom: 2px solid #f85149; }
  header h1 { font-size: 20px; color: #f85149; }
  header p { font-size: 13px; color: #8b949e; margin-top: 4px; }
  #map { height: 55vh; width: 100%; }
  .panel { padding: 16px 24px; background: #161b22; }
  .row { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; align-items: flex-start; }

  .search-box { position: relative; flex: 1; min-width: 220px; }
  .search-box label { display: block; font-size: 11px; color: #8b949e; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .search-box input {
    width: 100%; padding: 10px 12px; border-radius: 6px;
    border: 1px solid #30363d; background: #0d1117; color: #e6edf3; font-size: 14px;
  }
  .search-box input:focus { outline: none; border-color: #58a6ff; }
  .suggestions {
    position: absolute; top: 100%; left: 0; right: 0; z-index: 1000;
    background: #161b22; border: 1px solid #30363d; border-top: none;
    border-radius: 0 0 6px 6px; max-height: 220px; overflow-y: auto; display: none;
  }
  .suggestions div {
    padding: 9px 12px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #21262d;
  }
  .suggestions div:hover { background: #21262d; }
  .suggestions .road-tag { color: #8b949e; font-size: 11px; }

  select, button { padding: 10px 12px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: #e6edf3; }
  button { cursor: pointer; background: #f85149; border: none; font-weight: 600; height: 40px; align-self: flex-end; }
  #status { font-size: 13px; color: #58a6ff; margin-top: 8px; }
  #latency { font-size: 12px; color: #8b949e; }
</style>
</head>
<body>

<header>
  <h1>🌊 Flood-Aware Evacuation Routing — Mangaluru</h1>
  <p>Live route recalculation as flood conditions change</p>
</header>

<div id="map"></div>

<div class="panel">

  <div class="row">
    <div class="search-box">
      <label>Start location</label>
      <input type="text" id="startInput" placeholder="Search e.g. Kadri, Bunder...">
      <div class="suggestions" id="startSuggestions"></div>
    </div>
    <div class="search-box">
      <label>Destination</label>
      <input type="text" id="endInput" placeholder="Search e.g. Kudla, Balmatta...">
      <div class="suggestions" id="endSuggestions"></div>
    </div>
    <button onclick="requestRoute()">Get Safe Route</button>
  </div>

  <div class="row">
    <div class="search-box">
      <label>Flooded road</label>
      <input type="text" id="roadInput" placeholder="Search road name e.g. Car Street...">
      <div class="suggestions" id="roadSuggestions"></div>
    </div>
    <div class="search-box" style="flex: 0 0 200px;">
      <label>Severity</label>
      <select id="severity" style="width:100%; height:40px;">
        <option value="impassable">Impassable (fully blocked)</option>
        <option value="slow">Slow (partially flooded)</option>
        <option value="clear">Clear (flood receded)</option>
      </select>
    </div>
    <button onclick="reportFlood()">Report Flood</button>
  </div>

  <div id="status">Ready.</div>
  <div id="latency"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const API = "http://localhost:8000";
const map = L.map('map').setView([12.8756, 74.8420], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let routeLine = null;
let selectedStart = null;   // { id, label }
let selectedEnd = null;
let selectedRoad = null;    // { node_a, node_b, road_name }

let ws = new WebSocket("ws://localhost:8000/ws");

ws.onmessage = (event) => {
  const msg = JSON.parse(event.data);
  if (msg.type === "flood_update") {
    document.getElementById("status").innerText =
      `⚠️ ${msg.data.road_name} marked "${msg.data.severity}"`;
    if (selectedStart && selectedEnd) requestRoute();
  }
  if (msg.type === "route_result") {
    drawRoute(msg.data);
  }
};

// ---------- Generic debounced search-box wiring ----------
function wireSearchBox(inputId, suggestionsId, fetchUrl, onPick, renderItem) {
  const input = document.getElementById(inputId);
  const box = document.getElementById(suggestionsId);
  let timer = null;

  input.addEventListener("input", () => {
    clearTimeout(timer);
    const q = input.value.trim();
    if (!q) { box.style.display = "none"; return; }

    timer = setTimeout(async () => {
      const res = await fetch(`${fetchUrl}${encodeURIComponent(q)}`);
      const results = await res.json();
      box.innerHTML = "";
      if (results.length === 0) {
        box.style.display = "none";
        return;
      }
      results.forEach(item => {
        const div = document.createElement("div");
        div.innerHTML = renderItem(item);
        div.onclick = () => {
          onPick(item);
          box.style.display = "none";
        };
        box.appendChild(div);
      });
      box.style.display = "block";
    }, 200); // debounce
  });

  document.addEventListener("click", (e) => {
    if (!box.contains(e.target) && e.target !== input) box.style.display = "none";
  });
}

wireSearchBox("startInput", "startSuggestions", `${API}/locations/search?q=`,
  (item) => {
    selectedStart = item;
    document.getElementById("startInput").value = item.label;
  },
  (item) => item.label
);

wireSearchBox("endInput", "endSuggestions", `${API}/locations/search?q=`,
  (item) => {
    selectedEnd = item;
    document.getElementById("endInput").value = item.label;
  },
  (item) => item.label
);

wireSearchBox("roadInput", "roadSuggestions", `${API}/roads/search?q=`,
  (item) => {
    selectedRoad = item;
    document.getElementById("roadInput").value = item.road_name;
  },
  (item) => `${item.road_name} <span class="road-tag">(${item.label_a} → ${item.label_b})</span>`
);

// ---------- Actions ----------
function requestRoute() {
  if (!selectedStart || !selectedEnd) {
    document.getElementById("status").innerText = "❌ Pick a start and destination from the suggestions list.";
    return;
  }
  ws.send(JSON.stringify({ type: "request_route", start: selectedStart.id, end: selectedEnd.id }));
}

function drawRoute(data) {
  if (routeLine) { map.removeLayer(routeLine); routeLine = null; }

  if (data.error) {
    document.getElementById("status").innerText = "❌ " + data.error;
    return;
  }

  const latlngs = data.coordinates.map(c => [c.lat, c.lon]);
  routeLine = L.polyline(latlngs, { color: "#3fb950", weight: 5 }).addTo(map);
  map.fitBounds(routeLine.getBounds(), { padding: [40, 40] });

  document.getElementById("status").innerText =
    `✅ Safe route via ${data.roads_travelled.join(" → ")} | ETA: ${data.eta_minutes} min`;
  document.getElementById("latency").innerText =
    `Recalculation latency: ${data.calc_latency_ms} ms`;
}

async function reportFlood() {
  if (!selectedRoad) {
    document.getElementById("status").innerText = "❌ Search and pick a road first.";
    return;
  }
  const severity = document.getElementById("severity").value;

  const res = await fetch(`${API}/flood-update`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      node_a: selectedRoad.node_a,
      node_b: selectedRoad.node_b,
      severity
    })
  });

  if (!res.ok) {
    const err = await res.json();
    document.getElementById("status").innerText = "❌ " + err.detail;
  } else {
    document.getElementById("status").innerText = `✅ ${selectedRoad.road_name} reported as "${severity}"`;
  }
}
</script>
</body>
</html>
